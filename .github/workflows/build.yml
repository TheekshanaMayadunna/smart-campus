name: Build Project

on:
  push:
    branches: [develop, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build Backend
        run: |
          cd backend
          mvn clean install

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
