spring.application.name=demo
spring.datasource.url=jdbc:mysql://localhost:3306/smart_campus_db
# Database username & password
spring.datasource.username=root
spring.datasource.password=123456789
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.file.storage-path=./uploads/tickets
app.file.max-size-bytes=5242880
app.ticket.duplicate-cooldown-minutes=15
app.ticket.duplicate.mode=BLOCK
app.ticket.duplicate.similarity-threshold=0.7
app.ticket.resource-validation.stub-enabled=true
