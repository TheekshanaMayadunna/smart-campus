spring.application.name=smartcampus-backend

server.port=8080

# MySQL connection
spring.datasource.url=jdbc:mysql://localhost:3306/smart_campus?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Colombo
spring.datasource.username=root
spring.datasource.password=your_db_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# File upload settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# Custom upload folder
app.upload.dir=uploads/resource-images
app.base.url=http://localhost:8080

# Ticket file storage
app.file.storage-path=./uploads/tickets
app.file.max-size-bytes=5242880

# Ticket duplicate detection
app.ticket.duplicate-cooldown-minutes=15
app.ticket.duplicate.mode=BLOCK
app.ticket.duplicate.similarity-threshold=0.7
app.ticket.resource-validation.stub-enabled=true
